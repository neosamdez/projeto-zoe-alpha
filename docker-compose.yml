services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zoe_asi_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # Mapeamento para Hot-reload local
    env_file:
      - .env
    # Sobrescrevemos o comando prod do Dockerfile para rodar com --reload
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    networks:
      - asi_network

  db:
    image: postgres:16-alpine
    container_name: zoe_asi_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-asi_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - asi_network

  adminer:
    image: adminer:latest
    container_name: zoe_asi_adminer
    restart: always
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      - db
    networks:
      - asi_network

networks:
  asi_network:
    driver: bridge

volumes:
  postgres_data:
    name: zoe_asi_pgdata_persist
